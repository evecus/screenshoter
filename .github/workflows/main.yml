name: Build ScreenshotTool.exe

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow pywin32 pyinstaller

      - name: Build EXE
        run: pyinstaller ScreenshotTool.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScreenshotTool-${{ github.sha }}
          path: dist/ScreenshotTool.exe
          retention-days: 30

      - name: Create Release (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ScreenshotTool.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
