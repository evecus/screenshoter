name: Build ScreenshotTool.exe

on:
  workflow_dispatch:   # 允许手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller ScreenshotTool.spec

      - name: Upload artifact (每次构建)
        uses: actions/upload-artifact@v4
        with:
          name: ScreenshotTool-${{ github.sha }}
          path: dist/ScreenshotTool.exe
          retention-days: 30

      - name: Create Release (仅 tag 触发)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ScreenshotTool.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
